# SITE CONFIGURATION
baseurl: ""
url: "https://sixxon.github.io/"

# THEME-SPECIFIC CONFIGURATION
theme_settings:
  # Meta
  title: sixxon 
  avatar: assets/img/setting/profile0.png
  favicon: assets/img/setting/profile0.png
  gravatar: # Email MD5 hash
  description: "Microsoft 서비스 운영자의 작은 아카이브" # used by search engines

  # Header and footer text
  header_text: <br><br><br><br><br><br><br><br><br><br>
  header_text_feature_image: assets/img/setting/background.png
  footer_text: <p>Written by sixxon</p>

  # Icons
  rss: false
  email_address: "sioni322@naver.com" # Full email address, e.g. "sam@example.com"
  behance:
  bitbucket:
  dribbble:
  facebook:
  flickr:
  gitlab:
  github: "sixxon/sixxon.github.io"
  gitter:
  google_plus:
  instagram:
  linkedin:  # Full URL
  pinterest:
  reddit:
  soundcloud:
  stack_exchange:  # Full URL
  steam:
  tumblr:
  twitter:
  wordpress:
  youtube:

  # Scripts
  google_analytics: # Tracking ID, e.g. "UA-000000-01"
  disqus_shortname:
  katex: true # Enable if using math markup
  search: false # Enable the search feature

  # Localization strings
  str_follow_on: "팔로우"
  str_rss_follow: "RSS 피드 팔로우"
  str_email: "메일"
  str_next_post: "다음"
  str_previous_post: "이전"
  str_next_page: "다음"
  str_previous_page: "이전"
  str_continue_reading: "읽기"
  str_javascript_required_disqus: "댓글 기능 사용을 위해 Javascript 활성화가 필요합니다."
  str_search_no_results: "검색 결과가 없습니다."

  # Colours, typography and padding
  # Open the "_sass > base" folder, and open "_variables.scss"
  google_fonts: "IBM+Plex+Sans+KR:200,300,400,500,600"

  # Post navigation
  post_navigation: true

# PAGINATION
paginate: 5
paginate_path: "blog/page:num"

# BUILD SETTINGS
markdown: kramdown
highlighter: rouge
sass:
  sass_dir: _sass
  style: :compressed
plugins: [jekyll-paginate]
exclude:
  - Gemfile
  - Gemfile.lock
